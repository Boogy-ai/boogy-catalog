[service]
id = "stripe-base"
name = "Stripe Gateway"
version = "0.1.0"
wasm = "../../../target/wasm32-wasip2/release/stripe_base.wasm"
# Registry metadata — how a developer finds and understands this module. Write
# it the way they think ("I need to take payments with Stripe"), in plain words.
# Keywords are a few distinct tags, NOT phrases that restate the name/description
# (the registry already full-text-searches those).
description = """
Take payments with Stripe Checkout — bring your own Stripe account and key. \
Send a customer to a hosted Stripe payment page and find out the moment they \
pay (Stripe's callbacks are verified for you, and your keys are never exposed \
to the module). One deployment can back all of your apps at once and keeps \
each app's orders separate.\
"""
keywords = ["stripe", "payments"]
category = "payments"
# Optional display metadata (crates.io-style) surfaced by the registry.
repository = "https://github.com/Boogy-ai/boogy-catalog/tree/main/crates/catalog/stripe-base"
license = "MIT OR Apache-2.0"
authors = ["Boogy"]

owner = "alice"

[routing]
# Claim the whole owner subtree so /webhook, /checkout, /orders all route
# at the root.
path = "/"
methods = ["*"]

[ingress]
# Management routes require an authenticated principal; NO identity is hardcoded
# (the module is provisionable by anyone). The handlers' audience() does the
# authorization, host-attested: the SERVICE OWNER's agent (caller_is_service_owner)
# → Owner (sees all apps); a workload OWNED BY the service owner → that client
# app's partition; anyone else (a different owner's workload, a non-owner agent)
# → 403. So cross-owner isolation holds in-handler, without an owner-scoped
# ingress allowlist that would hardcode the wrong owner for every other provisioner.
mode = "authenticated"

# Stripe webhook callback: anonymous (Stripe carries no Boogy identity). Most-
# specific match wins; this exact path overrides the service-wide default for
# /webhook only. The handler verifies the Stripe-Signature HMAC host-side, so
# "public" here is authenticated by signature, not by ingress.
[[ingress.routes]]
path = "/webhook"
mode = "public"

[capabilities]
store = true
auth = true
clock = true
entropy = true
outbound_http = true
background_jobs = true
websockets = true

# Per-buyer order updates: each committed order transition pushes an
# `order.status` envelope to the buyer's own room. `class = "principal"` scopes
# delivery to the addressed customer_ref; `replay` lets a reconnecting client
# catch the last few transitions it missed.
[[websockets.channels]]
name = "orders"
class = "principal"
replay = 8

# outbound_http is granted, so an [outbound] block with a non-empty
# allowed_hosts is required. Stripe's API is the only third party this
# service talks to (DNS-pinned, SSRF-firewalled by the host).
[outbound]
allowed_hosts = ["api.stripe.com"]

# BYO-key secrets. The provisioner binds these out-of-band via the admin
# secrets endpoint; the wasm only ever sees the name.
[secrets]
# Injected as the `Authorization` header on outbound calls to api.stripe.com
# (host injects the bound value verbatim; the wasm never reads it).
stripe_secret_key = { usage = ["outbound-header"] }
# Verified HOST-SIDE via the hmac-verify capability: the wasm passes the
# signed message + expected hex, the host KMS-unwraps the secret, computes the
# HMAC-SHA256, and constant-time-compares. The wasm never reads the secret and
# it stays KMS-wrapped at rest. No store config row, no /config endpoint.
stripe_webhook_secret = { usage = ["hmac-verify"] }

# Durable webhook-apply handler: the /webhook route verifies + dedupes the
# Stripe event, enqueues this job, and returns 200 fast. The job applies the
# event (e.g. checkout.session.completed → mark the order paid).
[background_jobs.handlers.apply_webhook]
deadline_ms = 10000
max_attempts = 5
backoff_ms = 2000

# Durable checkout-session creation (the async DEFAULT for POST /checkout): the
# handler inserts a `queued` order and enqueues this job, which calls Stripe with
# a per-order Idempotency-Key and flips the order to `pending` (with the checkout
# URL) on success, or `failed` after exhausting attempts. deadline > the 8s Stripe
# call timeout; max_attempts mirrors CHECKOUT_MAX_ATTEMPTS in jobs.rs.
[background_jobs.handlers.create_checkout]
deadline_ms = 12000
max_attempts = 5
backoff_ms = 2000

[limits]
memory_mb = 32
timeout_ms = 10000
