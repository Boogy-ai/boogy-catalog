[service]
id = "resend-base"
name = "Resend Email Sender"
version = "0.2.0"
wasm = "../../../target/wasm32-wasip2/release/resend_base.wasm"
# Registry metadata — how a developer finds and understands this module. Write
# it the way they think ("I need to send email"), in plain words. Keywords are a
# few distinct tags, NOT phrases that restate the name/description (the registry
# already full-text-searches those).
description = """
Send email from your app, powered by Resend — bring your own Resend account \
and API key. Write a message inline or save reusable layouts with fill-in \
{{variables}}, send one or a batch, and see a log of everything sent. Sends \
are queued as durable jobs by default, so a send can be part of a transaction \
(it goes out only if your transaction commits). App admins get an operator \
view over everyone's mail and can block a sender. Your API key is stored as a \
secret the module never reads.\
"""
keywords = ["email", "resend"]
category = "email"
# Optional display metadata (crates.io-style) surfaced by the registry — a
# package-page FE renders these. `repository` is the open-source source link.
repository = "https://github.com/Boogy-ai/boogy-catalog/tree/main/crates/catalog/resend-base"
license = "MIT OR Apache-2.0"
authors = ["Boogy"]

[routing]
path = "/"
methods = ["*"]

[ingress]
# All routes require an authenticated principal; nothing anonymous. The operator
# surface (/admin/*) needs no per-route ingress override and NO hardcoded
# identity (the module is provisionable by anyone): the handler gates it with
# require_operator(), which uses the host-attested `caller_is_service_owner`
# capability to admit the service owner — their own agent token (resolved
# host-side) OR one of their own workloads. So the human owner can curl /admin
# directly, and the owner's backend can call it over peer.
mode = "authenticated"

[capabilities]
store = true
auth = true
clock = true
entropy = true
outbound_http = true
background_jobs = true

# outbound_http is granted, so an [outbound] block with a non-empty
# allowed_hosts is required. Resend's API is the only third party this
# service talks to.
[outbound]
allowed_hosts = ["api.resend.com"]

# BYO-key: the owner binds their Resend API key out-of-band via the admin
# secrets endpoint. The wasm only ever sees the name; the host injects the
# value as an outbound request header.
[secrets]
resend_api_key = { usage = ["outbound-header"] }

# The durable send job — the default send path enqueues this; it is also the
# retry on a transient Resend failure. `max_attempts` MUST match the
# `MAX_ATTEMPTS` const in src/jobs.rs (the handler flips the message to `failed`
# on its terminal attempt by comparing ctx.attempts against it).
[background_jobs.handlers.send_email]
deadline_ms = 10000
max_attempts = 5
backoff_ms = 2000

[limits]
memory_mb = 32
timeout_ms = 10000
