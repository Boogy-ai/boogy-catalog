[service]
id = "email-sender"
name = "Email Sender"
version = "0.1.0"
wasm = "../../../target/wasm32-wasip2/release/email_sender.wasm"
# Registry metadata — how a developer finds and understands this module. Write
# it the way they think ("I need to send email"), in plain words. Keywords are a
# few distinct tags, NOT phrases that restate the name/description (the registry
# already full-text-searches those).
description = """
Send email from your app, powered by Resend — bring your own Resend account \
and API key. Write a message inline or save reusable email layouts with \
fill-in {{variables}}, see a log of everything you've sent, and have failed \
sends retried for you. Your API key is stored as a secret the module never reads.\
"""
keywords = ["email", "resend"]
category = "email"

[service.owner]
user_id = "alice"

[routing]
path = "/"
methods = ["*"]

[ingress]
mode = "authenticated"

[capabilities]
store = true
auth = true
clock = true
entropy = true
outbound_http = true
background_jobs = true

# outbound_http is granted, so an [outbound] block with a non-empty
# allowed_hosts is required. Resend's API is the only third party this
# service talks to.
[outbound]
allowed_hosts = ["api.resend.com"]

# BYO-key: the owner binds their Resend API key out-of-band via the admin
# secrets endpoint. The wasm only ever sees the name; the host injects the
# value as an outbound request header.
[secrets]
resend_api_key = { usage = ["outbound-header"] }

# Retry handler for transient Resend failures. Filled in by a later task;
# declared here so the manifest + JobRouter wiring are in place.
[background_jobs.handlers.retry_send]
deadline_ms = 10000
max_attempts = 5
backoff_ms = 2000

[limits]
memory_mb = 32
timeout_ms = 10000
